
        <div id="calendar" class="panel">
            <div class="cal-header">
                <h2>Calendar</h2>
                <div class="cal-header-actions">
                    <div class="cal-toggle-bar">
                        <button class="cal-toggle active" onclick="switchCalView('today')">Today</button>
                        <button class="cal-toggle" onclick="switchCalView('week')">Week</button>
                    </div>
                    <button class="cal-refresh-btn" onclick="refreshCalendar()" title="Refresh">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                    </button>
                </div>
            </div>
            <div id="calDateLabel" class="cal-date-label"></div>
            <div id="calNextUp" class="cal-next-up" style="display:none;"></div>
            <div id="calEvents">
                <div class="cal-loading">Loading events...</div>
            </div>
        </div>
